# definition.yaml validation schema
# Validates work unit definitions per spec 00 §1.1
# Format: JSON Schema expressed in YAML for readability
$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Work Unit Definition"
description: "Schema for definition.yaml — the work contract"
type: object
required:
  - objective
  - deliverables
  - context_pointers
  - gate_policy
properties:
  objective:
    type: string
    minLength: 1
    description: "One-sentence goal statement"
  deliverables:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - name
        - acceptance_criteria
      properties:
        name:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: "Kebab-case identifier, unique within definition"
        acceptance_criteria:
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
        specialist:
          type: string
          pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
          description: "Domain type (e.g., api-designer)"
        depends_on:
          type: array
          items:
            type: string
          description: "Array of deliverable names from this definition"
        file_ownership:
          type: array
          items:
            type: string
          description: "Array of glob patterns"
        gate:
          type: string
          enum: ["human", "automated"]
          description: "Per-deliverable gate override"
    uniqueItems: true
  context_pointers:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - path
        - note
      properties:
        path:
          type: string
          minLength: 1
          description: "Relative path to file or directory"
        symbols:
          type: array
          items:
            type: string
        note:
          type: string
          minLength: 1
          description: "Why this context matters"
  constraints:
    type: array
    items:
      type: string
  gate_policy:
    type: string
    enum: ["supervised", "delegated", "autonomous"]
  mode:
    type: string
    enum: ["code", "research"]
    default: "code"
additionalProperties: false
