- number: 3
  title: "Pi staged work loop + adapter + dispatch + ambient contract"
  status: planned
  rationale: >-
    Once the minimum Go backend slice exists, Pi should come online early as the
    primary authoring runtime. A project-local Pi operating layer has now
    validated that direction with `/furrow-overview`, `/furrow-next`,
    `/furrow-transition`, and `/furrow-complete` over the Go backend. The
    narrow backend-mediated bookkeeping gap exposed by real use is now closed
    for the supported existing-row workflow, which means Furrow has reached
    Level 2 canonical Pi operation for that slice. However, structural parity
    is not enough: this phase must restore Furrow's supervised staged operating
    loop in Pi. The next work is now explicitly defined in
    `docs/architecture/pi-step-ceremony-and-artifact-enforcement.md`:
    converge toward a primary `/work`-like entrypoint, scaffold current-step
    artifacts on use, preserve Claude-baseline blockers, make seeds visible in
    the operator flow, and require supervised checkpoints at canonical
    boundaries. Adapter promotion remains important, but it is subordinate to
    restoring ceremony and enforcement; parallel orchestration remains fast
    follow within this same phase.
  rows:
  - index: 1
    branch: work/pi-adapter-foundation
    description: Restore a primary Pi `/work` operating loop, then stabilize/promote the adapter without thickening TS semantics
