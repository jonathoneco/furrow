  - number: 1
    title: "Install & Merge Foundation"
    status: planned
    rationale: "Recurring commit/merge issues across this repo and consumer projects. Two parallel rows: install-and-merge (install architecture + /furrow:merge skill + reintegration summary, all sharing bin/frw.d/ hook surface) and post-ship-reexamination (watch-list + decision-review TODO type — structurally decoupled primitive for post-evidence re-examination)."
    parallelism: "install-and-merge || post-ship-reexamination"
    rows:
      - branch: work/install-and-merge
        description: "Install architecture + ~/.config/furrow/ tier + /furrow:merge skill + worktree reintegration summary"
        todos:
          [
            install-architecture-overhaul,
            config-cleanup,
            merge-process-skill,
            worktree-reintegration-summary,
          ]
        estimated_sessions: 5
        key_files:
          [
            install.sh,
            bin/frw.d/install.sh,
            bin/frw.d/scripts/launch-phase.sh,
            bin/frw.d/hooks/,
            bin/frw.d/lib/common.sh,
            bin/frw,
            commands/,
            commands/next.md,
            skills/implement.md,
            skills/shared/context-isolation.md,
            .furrow/,
          ]
        conflict_risk: none
        completed_at: null
      - branch: work/post-ship-reexamination
        description: "Almanac watch-list primitive + decision-review TODO schema type — structured post-evidence re-examination"
        todos: [post-merge-watch-list, decision-review-todo-type]
        estimated_sessions: 2
        key_files:
          [
            .furrow/almanac/,
            bin/alm,
            schemas/todos.schema.yaml,
            adapters/shared/schemas/todos.schema.yaml,
            skills/review.md,
            skills/shared/summary-protocol.md,
          ]
        conflict_risk: none
        completed_at: null
  - number: 2
    title: "Almanac Graph, Seeds, and Promotion"
    status: planned
    rationale: "Foundational graph primitives, seed concept, and the promotion system that graduates row-level knowledge up the tier chain. Consolidated into one row because the previous split (almanac-and-seeds || ambient-promotion) couldn't actually parallelize — both rewrite bin/alm and .furrow/almanac/, with mitigation already requiring sequential merge. Building them together means the graph design accommodates promotion from day 1."
    parallelism: "almanac-graph-and-promotion (single row)"
    rows:
      - branch: work/almanac-graph-and-promotion
        description: "First-class seed graph, seeds concept, and context promotion (row to project to global)"
        todos: [almanac-graph-primitives, seeds-concept, ambient-context-promotion]
        estimated_sessions: 7
        key_files:
