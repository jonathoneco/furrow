    rationale: "Command layer matures after agent wiring, reviews, and graph primitives stabilize. Re-split by theme (not by subsystem): each row owns a distinct file scope — triage-pipeline owns commands/triage.md, roadmap-handoff owns commands/next.md + templates/, todo-and-research owns TODO schema + research surface. Eliminates the latent cross-row conflict on commands/triage.md + commands/next.md that existed in the previous command-pipeline/planning-ux split."
