- id: pi-adapter-package
  title: Build the Furrow Pi package/extension on the stable backend
  context: |
    Pi support should be built fresh once the Go backend contract is stable
    enough to consume, and it should become the primary authoring runtime as
    early as practical. The adapter should use the real Pi APIs and compose with
    selected baseline extensions or equivalent patterns where helpful, but it
    should not revive the old speculative portability spike.

    Initial validation landed as a project-local Pi extension (`.pi/extensions/furrow.ts`)
    that already provides `/furrow-overview`, `/furrow-next`,
    `/furrow-transition`, and `/furrow-complete` over the Go backend. With
    backend-mediated row bookkeeping now in place for the supported existing-row
    workflow, Furrow has reached Level 2 canonical Pi operation for that slice.

    Promotion alone is not sufficient. The adapter now has an explicit
    preservation spec in `docs/architecture/pi-step-ceremony-and-artifact-enforcement.md`:
    a primary `/work`-like operating loop, create-on-use artifacts, supervised
    checkpoints, Claude-baseline blockers, and seed-visible workflow shaping.
    Adapter promotion stays subordinate to that operating-loop restoration.
  work_needed: |
    - Promote the current project-local extension into a small repo-owned `adapters/pi/` layout
    - Keep `/furrow-overview`, `/furrow-next`, `/furrow-transition`, and `/furrow-complete` thin over backend JSON calls while converging toward a primary `/work`-like entrypoint
    - Wire Pi events/hooks against backend contracts without reimplementing workflow semantics in TS
    - Preserve artifact-aware prompts and mutation guardrails around canonical `.furrow/` state
    - Carry forward the Level 2 supported existing-row workflow without requiring direct state edits
    - Use `docs/architecture/pi-step-ceremony-and-artifact-enforcement.md` as the acceptance spec for adapter behavior, not just packaging/layout promotion
    - Make the primary `/work` entrypoint almanac-aware in the sense defined by `docs/architecture/pi-almanac-operating-model.md`, while sequencing full seed-backed planning surfaces after seeds lands
    - Decide which baseline Pi extension patterns to compose vs replace
    - Keep TS focused on runtime wiring and orchestration UX rather than lifecycle semantics
    - Add only the next backend-driven capability that real Pi use proves necessary
