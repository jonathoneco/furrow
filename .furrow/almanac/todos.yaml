  title: Sweeping schema audit and shrink
  context: 'Review-step on pre-write-validation-go-first surfaced that schemas/definition.schema.json carries optional/edge-case rules that the hand-coded validator (D1) chased across 7 review rounds. Empirical usage audit (44 rows): per-deliverable gate=0 used, supersedes=1 used, source_todo singular=10 (redundant with source_todos plural), context_pointers symbols=5 used. Each unused/under-used optional field expands D1''s validator surface and gives reviewers more rules to cite. The pain isn''t a validator bug — it''s a schema-breadth signal. Generalize beyond definition.schema.json: state.schema.json, plan.schema.json, learning.schema.json, repair-deliverables-manifest.schema.json, reintegration.schema.json, review-result.schema.json, merge-policy.schema.json, promotion-targets.schema.yaml all likely have similar accumulated breadth.'
  work_needed: 'Run a sweeping schema audit across schemas/. For each schema: (1) measure actual usage of each optional field across .furrow/rows/*/, (2) identify dead fields (zero use), under-used fields (<10% use), and redundant forms (singular+plural pairs); (3) propose a shrink plan with migration cost; (4) ship the shrink with the necessary row migrations. Concrete D1-validator-pain candidates already evidenced: per-deliverable gate (drop), supersedes (move to archive.json), source_todo singular (drop, fold into source_todos), context_pointers.symbols (drop). Acceptance: validators drop measurable LOC; schemas tighter; row migrations applied with checksum verification.'
