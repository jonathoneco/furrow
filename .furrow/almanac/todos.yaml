- id: default-supervised-gating
  title: "Default gate policy should be supervised, not auto-advance"
  context: |
    The harness should default to supervised gating — the user confirms gate
    passage rather than the agent auto-advancing. Auto-advance is appropriate
    for well-understood pipelines, but the default should be the safer option
    where the user reviews gate results and decides whether to proceed.
    Additionally, supervised mode currently has no structural enforcement —
    the agent can call step-transition.sh with "manual" as the decider without
    actually pausing for user review. The namespace-rename row demonstrated
    this: it steamrolled from research through implement without a single user
    interaction turn after ideation.
  work_needed: |
    - Change the default gate_policy in furrow.yaml / init-row.sh to "supervised"
    - Ensure /work --gate-policy flag still allows override to "auto" or "manual"
    - Update documentation and CLAUDE.md to reflect the new default
    - Audit existing step-transition.sh for supervised flow (pause, present evidence, ask)
    - Enforce supervised pause structurally: step-transition.sh or a hook should reject
      transitions in supervised mode unless there's evidence of user interaction (e.g.,
      a conversation turn marker, or explicit "present output and wait" in step skills)
    - Add explicit "present and wait" instructions to each step skill's transition section
      for supervised mode — the agent must show the step's output and get user sign-off
