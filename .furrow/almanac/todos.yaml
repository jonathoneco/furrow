- id: backend-mediated-row-bookkeeping
  title: Remove remaining manual row bookkeeping from Pi-driven Furrow flows
  context: |
    The first Pi Furrow operating layer is now usable for overview, next-step
    guidance, backend-mediated transitions, and completion of the supported
    existing-row workflow. Real usage originally exposed a concrete backend gap:
    after a valid `furrow row transition`, some row deliverable or completion
    bookkeeping still required direct `state.json` edits. That broke the
    canonical rule that harness state mutations must go through backend/CLI
    commands rather than direct file edits.

    That gap is now closed for the supported path by adding `furrow row complete
    <row-name> --json` and wiring Pi to consume it via `/furrow-complete`.
    Furrow can now claim Level 2 canonical Pi operation for the supported
    existing-row workflow without manual row-state edits.
  work_needed: |
    - Keep `furrow row complete <row-name> --json` stable as the narrow bookkeeping surface for the supported flow
    - Preserve atomic writes and unknown-field preservation guarantees
    - Treat broader lifecycle semantics (review/archive/gates) as separate follow-on work, not scope creep inside this slice
    - Use this result as the baseline for Pi adapter promotion and future parity work
