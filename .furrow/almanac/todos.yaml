    - Add explicit "don't make assumptions" instructions: the agent must ask rather than guess
    - Define the collaboration loop: present draft → ask targeted questions → incorporate answers → repeat until resolved
    - Each step's collaboration should be scoped (ideate: create clarity on goals, research: validate findings, plan: hash out implementation details, spec: address open questions)
    - Consider a shared skill fragment for the interaction pattern
    - Ensure stop hooks don't penalize the agent for iterating mid-step
