- id: pi-step-ceremony-and-artifact-enforcement
  title: Restore Pi /work ceremony, create-on-use artifacts, supervised checkpoints, and seed-visible flow
  context: |
    Current Pi Furrow flows are canonically backend-mediated for the supported
    existing-row path, but they still feel thinner than mature Furrow because
    they preserve structure better than workflow power. Pi can inspect rows,
    guide next actions, transition, and complete bookkeeping, yet it does not
    strongly enforce or scaffold the staged flow through ideation, research,
    plan, spec, decompose, implement, and review.

    The clarified preservation target is now explicit: Pi should converge toward
    a single primary `/work`-like operating loop that regrounds the current
    stage, surfaces blockers and seed state, scaffolds the active step artifact
    on use, and pauses at supervised checkpoints using Claude-form blocker
    semantics unless explicitly revised.
  work_needed: |
    - Implement a primary `/work`-like Pi entrypoint concept over backend-canonical state
    - Make Pi step-aware in a stronger sense: current stage meaning, expected artifacts, and likely next actions
    - Scaffold only the current step's artifact on use; never treat artifact existence as completion
