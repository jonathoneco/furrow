- id: furrow-next-semantic-merge
  title: "furrow:next semantic merge — read row artifacts for intelligent merge + per-deliverable squash"
  context: |
    Brain-dump 2026-04-22: "when merging in furrow:next, we should consider
    the furrow artifacts to understand the reasoning behind the changes and
    merge intelligently" and "merge trees should collapse commits rather than
    push all commits." Today, `/furrow:next` merges with whatever git strategy
    is the default. Row artifacts (definition.objective, acceptance_criteria,
    plan.json waves, summary.md findings, review verdict) contain the
    *semantic* shape of the change and should drive commit structure and
    context surfacing for conflicts.

    Significant overlap with the currently active merge/worktree work —
    sequence carefully so this doesn't re-decide what that work lands.
  work_needed: |
    - Squash policy: per-deliverable as default (decision baked). Each
      deliverable becomes one commit on the target branch. Falls back to
      per-row only when the row has a single deliverable or deliverables are
      trivially coupled.
    - Generate squash commit messages from artifacts: title from
      definition.objective or deliverable.name; body from summary.md Key
      Findings + Recommendations; footer with gate history and specialist
      assignments for traceability.
    - Merge vs PR is configurable via furrow.yaml (decision baked). Direct
      merge is faster; PR preserves review outside Furrow. Projects opt in.
    - Conflict resolution: surface context to the human first — present the
      row's rationale alongside any unresolved conflict rather than raw
      `<<<<<<<` markers. LLM-driven merge is a trust leap, explicitly
      deferred.
    - Gate the merge on review verdict — only `pass` rows auto-merge;
      `needs-revision` blocks; `fail` requires explicit override.
    - CI signal interaction: if CI ran on individual wave commits and passed,
      the squashed commit re-runs CI — note this as expected behavior in
      docs; no special handling needed at the merge layer.
  open_questions:
    - "Determinism: which parts of the merge strategy are deterministic (squash, commit-message assembly) vs judgement-requiring (semantic conflict surfacing)? Deterministic parts should be testable end-to-end; non-deterministic parts need a different harness (maybe eval-style)."
