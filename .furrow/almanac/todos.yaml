- id: sub-agent-normalization
  title: "Sub-agent normalization — register specialists as Claude Code agent types with single-source generation"
  context: |
    Furrow specialists are currently packaged as slash-command templates
    (.claude/commands/specialist:*.md + specialists/*.md). Dispatch instructions
    in skills/shared/specialist-delegation.md, skills/shared/context-isolation.md,
    and skills/implement.md tell the orchestrator to inline the template body
    into Agent(prompt=...) with model resolved from frontmatter.

    Failure mode observed 2026-04-22: orchestrator dispatched
    Task(subagent_type="specialist:test-engineer") during wave-1 pre-review.
    Claude Code's agent resolver has no such registered type — specialists are
    slash commands, not agents — so dispatch errored with the full available-agents
    list. The soft prompt-level norm ("inline the template body") silently allows
    this class of mis-invocation.

    Registering specialists as actual Claude Code agent types (.claude/agents/*.md)
    converts soft norms into harness-enforced invariants:
      1. Dispatch-time validation — typos in specialist names fail immediately
         instead of silently fabricating or drifting.
      2. Tool scoping — agent frontmatter can restrict tool allowlist
         (e.g., relational-db-architect denied Write/Bash, only Read/Grep),
         giving the harness real teeth instead of prompt-begging.
      3. Durable persona + model pin — specialist system prompt persists for
         the whole subagent session (not a user-message the model can drift
         from), and model selection cannot be fumbled by the orchestrator.

    This aligns with the "hard block over auto-correct" stance (see
    memory/feedback_hard_block_over_autocorrect.md).

    The cost to avoid: triple-sourced specialist definitions
    (specialists/*.md + .claude/commands/specialist:*.md + .claude/agents/*.md)
    drifting out of sync. Mitigation: treat specialists/*.md as the single source
    of truth; generate the other two at install/update time from it.
  work_needed: |
    - Pick single source of truth (proposal: specialists/*.md) and document the
      generation direction in rationale.yaml.
    - Extend specialist frontmatter schema to carry what Claude Code agents need:
      description (one-liner for agent index), tools (allowlist — decide per
      specialist whether it gets Write/Edit/Bash or is read-only), model.
      Reconcile with existing Furrow fields (name, type: specialist, model_hint).
    - Add a generator (likely in bin/frw.d/scripts/ or install.sh) that emits
      .claude/agents/specialist-{name}.md and .claude/commands/specialist:{name}.md
      from specialists/*.md. Include a frw doctor check that fails if generated
      files are stale relative to their source.
    - Decide tool allowlists per specialist. Minimum: read-only specialists
      (complexity-skeptic, security-engineer advisory roles) get no Write/Edit/Bash.
      Implementer specialists (go-specialist, python-specialist) get full toolset
      but file-ownership is still enforced by prompt + correction-limit hook.
    - Update skills/shared/specialist-delegation.md and skills/implement.md to
      prefer Agent(subagent_type="specialist-{name}") with prompt= carrying only
      the curated per-deliverable context (assignment, acceptance_criteria,
      file_ownership, summary.md excerpts). Remove the "inline template body"
      instruction; that content now lives in the registered agent system prompt.
    - Preserve composition: step-specific modifiers and code-quality skills
      (red-flags.md, git-conventions.md) still need to reach the subagent. They
      go in prompt= alongside the assignment, not in the agent system prompt
      (those are per-call, not per-specialist).
    - Add rationale.yaml entries for .claude/agents/ and the generator script.
    - Install.sh must create .claude/agents/ and regenerate on update; auto-install
      hook should detect missing/stale generated files.
    - Add an anti-pattern callout in specialist-delegation.md documenting the
      old inline-template pattern as deprecated (for any row that tries it).
    - Migration: existing .claude/commands/specialist:*.md files must survive
      until the generator ships — don't remove them in the same change that
      introduces the generator.
