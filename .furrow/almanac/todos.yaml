- id: furrow-work-worktree-integration
  title: "furrow:work auto-creates a git worktree when not already on one"
  context: |
    Currently `/furrow:work` creates a row in the current branch. This conflates
    row lifecycle with branch lifecycle and makes parallel rows impossible
    without manual worktree setup. Auto-creating a worktree isolates row
    artifacts, enables clean merge semantics for `/furrow:next`, and lets the
    user run multiple rows concurrently via tmux/sessionizer (see
    tmux-sessionizer-integration). Applies to both code-mode and research-mode
    rows.
  work_needed: |
    - Detect whether CWD is already in a worktree for a matching row. If yes,
      proceed. If no, auto-create (no prompt — decision baked) at a sibling
      path: `../{repo}-rows/{row-name}/` is the chosen convention.
    - When the Claude Code session was spawned on main and a worktree is
      created, the session must explicitly call this out to the user ("row
      created in worktree at X — your CC session is still on main; next
      commands should be run from there"). Don't silently split state.
    - On `/furrow:archive`: prompt the user to merge from main (not automatic),
      but do NOT auto-remove the worktree. "Archive means done" is true for
      row state; the worktree stays around for reference until the user
      removes it.
    - Handle user abort mid-`/furrow:work` — if worktree was created but the
      row init failed, clean up the worktree to prevent orphans.
    - Interaction with Furrow's file-ownership model: worktree creation is
      orthogonal, but `bin/` commands must resolve `PROJECT_ROOT` correctly
      from any worktree.
    - Research-mode rows also get worktrees — they benefit from isolation even
      when not touching code, and it keeps the flow uniform.
  source_type: "brain-dump"
