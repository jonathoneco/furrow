- id: delegation-boundary-enforcement
  title: Delegation boundary enforcement
  context: 'Sibling to handoff-prompt-artifact-template and furrow-context-isolation-layer; together they form the orchestration/delegation contract. Without explicit enforcement, the layer split is a convention not a constraint: the furrow-unaware specialist could read .furrow/ state, the orchestrator could leak internal context downward, and the boundary erodes silently. The handoff schema (7 fields) defines what crosses; this todo enforces that nothing else does.'
  work_needed: 'Define what crosses the layer boundary in each direction: (a) furrow-aware → furrow-unaware: only the 7 handoff fields; no row state, almanac, .furrow/ details; (b) furrow-unaware → furrow-aware: only EOS-report-shaped output; no leakage of internal reasoning or scratch artifacts; (c) hook/CLI access: only the furrow-aware layer may invoke rws/alm/sds/frw or read .furrow/. Mechanism options: (1) prompt-level scoping (skill files only loaded for the layer that needs them), (2) tool-permission scoping (Pi extension restricts tool access by skill), (3) test-driven boundary check (run a furrow-unaware specialist on a non-Furrow project, assert zero Furrow leakage in artifacts produced). Probably all three, layered.'
  source_type: manual
  status: done
