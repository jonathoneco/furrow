# --- Token Optimization ---
- id: per-step-model-routing
  title: "Per-step model routing — Opus for reasoning, Sonnet for execution, session-level switching"
  context: |
    Token burn rate is unsustainable — 15% of weekly usage in 3 hours on a Monday.
    Not every step needs Opus. The step sequence has fundamentally different cognitive
    demands: ideate/plan/review-synthesis need deep reasoning (Opus), while
    research/spec/decompose/implement-agents are mostly following structured instructions
    (Sonnet). Gate evaluators and Phase A artifact checks are formulaic (Sonnet).

    Step model hints already exist in skill frontmatter (model_default), and specialist
    templates have model_hint. But these only affect subagent spawning — the main session
    always runs at whatever model it launched with. The real savings come from:
    1. Launching sessions with the right model per step/row
    2. Ensuring subagent model routing is actually followed (not ignored)
    3. Recommending session breaks at step boundaries for model switching

    Rough cost impact: research, spec, decompose, and implementation agents are the
    bulk of work — routing these to Sonnet could save 40-60% of token cost.

    Model mapping:
    - ideate: Opus (creative reasoning, premise challenge)
    - research: Sonnet (web search, doc reading, synthesis)
    - plan: Opus (architecture decisions, tradeoff analysis)
    - spec: Sonnet (structured writing from plan decisions)
    - decompose: Sonnet (formulaic given plan)
    - implement orchestrator: Opus, implement agents: Sonnet
    - review Phase A: Sonnet (artifact checks), Phase B synthesis: Opus
    - gate evaluators: Sonnet (structured rubric evaluation)

    Preferred architecture: **orchestrator + step agents with collaborate/execute split**.
    The main session stays Opus as a persistent orchestrator. Every step has two phases:

    - **Collaborate** (inline, Opus) — orchestrator presents findings/drafts to user,
      asks targeted questions, iterates until decisions are made. Collaboration never
      leaves the orchestrator session — it's the orchestrator's core job.
    - **Execute** (dispatched, Sonnet) — subagent does the heavy lifting with the
      decisions already made: read docs, write specs, generate code, check artifacts.

    The dispatch loop per step:
    1. Orchestrator dispatches Sonnet agent → "do research on X, Y, Z"
    2. Agent returns findings/artifacts
    3. Orchestrator presents to user, collaborates, iterates
    4. Orchestrator dispatches Sonnet agent → "write artifact based on these decisions"
    5. Agent returns final artifact
    6. Orchestrator presents for gate approval
    7. Repeat collaborate/execute as needed within the step

    Ideation runs fully inline (it's pure collaboration). Other steps sandwich Sonnet
    execution between Opus collaboration rounds. Step skills split into two concerns:
    execution instructions (for the subagent) and collaboration protocol (for the
    orchestrator). This also solves context pollution — each step agent starts fresh
    with only the context it needs.
  work_needed: |
    - Design the collaborate/execute split for each step skill
    - Split step skills into: execution instructions (subagent) + collaboration protocol (orchestrator)
    - Create orchestrator skill: dispatch loop, context curation, collaboration protocol
    - Define what context the orchestrator passes to step agents (skill + summary + decisions)
    - Define how step agent results flow back (artifact files, structured summary)
    - Audit current model_default and model_hint usage — is it being respected?
    - Wire Agent tool calls with explicit model parameter per step
    - Handle multi-round collaborate/execute within a single step (research → discuss → refine → discuss)
    - Ensure ideation runs fully inline (pure collaboration, no dispatch)
    - Update skills/shared/context-isolation.md with orchestrator/step-agent boundary rules
    - Measure before/after token usage on a representative row
    - Deduplicate global/parent CLAUDE.md as a baseline optimization
    - Consider hook consolidation (5 PreToolUse hooks per Write/Edit)
  references:
    - skills/implement.md
    - skills/shared/context-isolation.md
    - specialists/
    - bin/frw.d/scripts/launch-phase.sh
  source_type: brain-dump
  created_at: "2026-04-06T00:00:00Z"
  updated_at: "2026-04-06T00:00:00Z"
