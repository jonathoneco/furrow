- id: default-supervised-gating
  title: "Default gate policy should be supervised, not auto-advance"
  context: |
    The harness should default to supervised gating — the user confirms gate
    passage rather than the agent auto-advancing. Auto-advance is appropriate
    for well-understood pipelines, but the default should be the safer option
    where the user reviews gate results and decides whether to proceed.
    Additionally, supervised mode currently has no structural enforcement —
    the agent can call step-transition.sh with "manual" as the decider without
    actually pausing for user review. The namespace-rename row demonstrated
    this: it steamrolled from research through implement without a single user
    interaction turn after ideation.
  work_needed: |
