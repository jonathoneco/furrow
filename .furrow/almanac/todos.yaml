- id: seeds-concept
  title: "Seeds as the task management primitive — unified work graph, in-row tracking, gating, and alm delegation"
  context: |
    Seeds are the fundamental task management primitive for Furrow. They operate at
    two levels:

    1. **Cross-row work graph** — Seeds own the dependency graph: edges between work
       items, dependency types (blocks, informs, requires, produces), ordering constraints,
       and cascading implications. This subsumes what beans did and what alm triage
       currently infers through LLM reasoning. The graph should be explicit and
       deterministic, not reasoned about. Almanac (alm) calls seeds for graph queries
       when doing triage, roadmapping, and planning — alm is the planning surface,
       seeds are the graph engine.

    2. **Within-row granular work management** — Seeds are used inside a row for
       spec'ing and decomposition. During spec, work items become seeds with explicit
       edges. During decompose, the seed graph determines wave ordering and parallelism.
       Gate checks query seed status to verify preconditions are met before step
       transitions. This replaces the current pattern where plan.json and definition.yaml
       carry implicit dependency information.

    Critically, these two levels share one graph. Within-row seeds can have edges to
    cross-row seeds — a deliverable in row A might depend on a seed that originated
    in row B, or produce a seed that feeds row C. sds owns this unified graph,
    giving visibility into how granular in-flight work connects to the broader plan.

    Additionally, seeds serve as knowledge reduction artifacts — after research and
    exploration, broad findings are distilled into focused seeds that drive downstream
    steps. But this is secondary to their role as the work graph primitive.

    Decision update: seeds should fully subsume TODOs as the canonical planning
    primitive. `todos.yaml` may exist only as a temporary compatibility layer during
    migration; the long-term model is seeds as the single canonical work graph,
    roadmap as an almanac projection over that graph, and almanac as memory +
    synthesis rather than duplicate task storage.

    The sds CLI is the primary interface for all graph operations. Both alm
    and rws delegate graph functionality to sds — alm for planning (triage,
    roadmap), rws for row-level operations (gating, step transitions, wave
    ordering, deliverable dependencies).

    **Absorbs `almanac-graph-primitives` (2026-04-23)**: the alm-side wiring
    (triage/roadmap reading the seed graph instead of LLM-reasoning) is the
    same scope — "alm is the planning surface, seeds are the graph engine" is
    the thesis of both TODOs. Rolled into work_needed below.

    **Post-seeds re-triage candidates**: `sprint-inspired-planning` (explicitly
    references cross-row seeds), `post-merge-watch-list` (watches likely become
    a seed type), `support-sharded-todos-d-directory` (may be rendered moot by
    seeds-as-graph-nodes). Re-evaluate after seeds lands.

    **Implementation note**: seeds-concept lands after cli-architecture-overhaul
    (Go rewrite). The graph engine belongs in Go — edge types, queries, and
    traversals are painful in bash and painless in Go.
  work_needed: |
    - Define the seed data model: id, title, type, status, priority, edges, metadata
    - Define typed graph nodes across multiple scopes: initiative/epic, row-backing seed, decomposed work unit, deliverable, follow-up, watch/deferred work
    - Design edge types: blocks, depends-on, informs, produces, supersedes
    - Define seed lifecycle: open → claimed → active (row) → closed
    - Design how seeds spawn rows and how rows produce seeds
    - Treat each row as having one primary seed plus optional related child/dependency/follow-up seeds
    - Replace TODOs as the canonical planning registry; roadmap and triage should read from seeds rather than long-term `todos.yaml` authority
    - Design within-row seed usage: spec creates seeds, decompose reads the graph for waves
    - Define the operationalization rule: if Furrow orchestrates it, it must be a seed
    - Enforce no delegation, parallel launch, or independent review without a seed-backed work unit
    - Wire gate checks to query seed status for precondition verification
    - Integrate with sds CLI: sds should become the primary interface for graph operations
    - Design how rws delegates to sds for step transitions, gating, and wave ordering
    - Consider whether seeds replace plan.json's implicit dependency tracking
    - Design cross-row ↔ within-row edge semantics (deliverable depends on external seed, row produces downstream seeds)
    - Prototype with a multi-deliverable row to validate both levels and cross-row connections
    - (From absorbed almanac-graph-primitives) Wire alm triage to query sds for dependency
      ordering instead of inferring through LLM reasoning
    - (From absorbed almanac-graph-primitives) Wire alm roadmap generation to read seed edges
