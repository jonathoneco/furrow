# --- Bundle A: CLI Architecture ---
- id: cli-architecture-overhaul
  title: "CLI architecture overhaul — Go rewrite of frw/rws/alm/sds with modularization, structured logging, introspection"
  context: |
    The CLIs (frw, rws, alm, sds) are currently shell scripts routing to other shell
    scripts. Shell is actively painful at current scope: ARG_MAX bugs in alm triage
    (hit 2026-04-23 at 90 TODOs), no type safety, no structured logging, brittle
    error handling, and increasingly complex sub-dispatch logic.

    Decision 2026-04-23: rewrite in **Go**. Single-binary distribution, strong
    stdlib for YAML/JSON, clean CLI ergonomics, fast startup, shell-native feel,
    simple install story. TypeScript was the alternative — rejected because the
    node dependency weakens the install story and type-sharing with agent code
    isn't a near-term need.

    Decision 2026-04-23: all-in — no bash quick-wins phase. Ergonomics decisions
    from `cli-ergonomics-pass` become design input; their implementation lands in
    the rewrite, not in transitional bash.

    The harness also lacks self-understanding — it doesn't know its own tool
    inventory, and past conversations contain patterns that should be extracted
    into CLI features. This row includes building that introspection as a
    first-class feature of the new Go CLIs.
  work_needed: |
    - **Language decision**: Go (baked). Confirm runtime (Go 1.22+), module layout,
      dependency policy (prefer stdlib, minimal 3rd-party).
    - **Module layout**: one Go module per CLI (cmd/frw, cmd/rws, cmd/alm, cmd/sds)
      sharing an internal package for row/state/schema/seed primitives. Replaces
      cli-breakup-script-guard (absorbed) — breakup becomes the rewrite's module
      architecture by construction.
    - **Command-surface spec**: inherit decisions from cli-ergonomics-pass
      (absorbed as design input): strict section-name validation with self-teaching
      errors, auto-regenerate summary on missing file, `frw set-field`/`frw patch`
      split, `rws update-deliverable` first-class, no `frw checkpoint` CLI,
      introspection via `frw help` / `rws help` / `alm help` / `sds help`. Same
      for `register-deliverable-command` (absorbed).
    - **Structured logging** (absorbs log-disposition-discipline): ship structured
      log emission (JSON lines with level, category, row context, suggested action)
      from day one. End-of-session comb converts persistent-category entries into
      TODOs. Global log at `.furrow/logs/warnings.jsonl` with row/file context
      attached.
    - **Schema handling**: Go structs generated from schemas/*.schema.json; types
      shared across CLIs via the internal package. Validation is type-level, not
      hand-rolled.
    - **Hook invocation**: bash hooks in bin/frw.d/hooks/ stay shell (they're
      simple and shell-interactive-friendly), invoked by the Go harness.
      Re-evaluate if any hook grows complex enough to warrant porting.
    - **Install story**: `go install` for single-binary distribution. install.sh
      either drops Go-binary build step or curls release artifacts. Preserve the
      offline/vendored case if still supported.
    - **Mine past conversations** for CLI features: scrape Furrow history for
      user-requested-but-never-added patterns (e.g., manual file-writing requests
      that should be `rws add-artifact`).
    - **Introspection**: `frw help` (and rws/alm/sds) describe their own
      capabilities. One canonical discovery point for agents, so they don't guess
      or read source. Plus: `--format human|json|table` on data-returning commands.
    - **Migration plan**: phase the rewrite in a single row with multiple
      deliverables (per CLI). Each CLI can be shipped independently once its
      module reaches parity; bash version stays until Go version lands per CLI.
    - **Testing**: Go test coverage for each command, integration tests driving
      the Go binary against real .furrow/ fixtures (replaces current
      tests/integration/*.sh which may stay shell or migrate selectively).
    - **Cross-CLI state mutations**: the internal package is the only writer to
      state.json, summary.md, seeds.jsonl, etc. Each CLI imports it. Prevents
      the current "rws calls alm calls rws" shell-dispatch tangle.
  references:
    - bin/frw
    - bin/rws
    - bin/alm
    - bin/sds
    - bin/frw.d/scripts/
    - bin/frw.d/hooks/
    - schemas/
    - install.sh
    - tests/integration/
