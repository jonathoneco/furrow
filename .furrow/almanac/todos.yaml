- id: parallel-agent-orchestration-adoption
  title: "Built-in team orchestration isn't being used — diagnose and fix"
  context: |
    The harness has a fully built parallel agent orchestration system:
    wave planning (generate-plan.sh with topological sort), specialist templates
    (14+ types with reasoning patterns), context isolation rules, file ownership
    conflict detection (check-wave-conflicts.sh), team-plan.md structure, and
    dual-path specialist loading (Skill tool for solo, Agent prompt for multi-agent).

    Despite all this infrastructure, the implement step consistently falls back to
    solo execution rather than dispatching specialist teams. The decompose step
    produces plan.json with waves and assignments, but the agent doesn't follow
    through on multi-agent dispatch during implementation.

    Possible causes:
    - The implement skill instructions are too dense — agent doesn't internalize the dispatch pattern
    - No concrete example of the orchestration loop (plan → dispatch wave 1 → wait → curate → dispatch wave 2)
    - Context curation (selecting what to pass each sub-agent) is underspecified
    - The agent may not trust the wave plan and defaults to doing everything itself
    - Model capability — orchestration may require Opus-level reasoning while we're considering Sonnet routing
  work_needed: |
    - Diagnose: run a multi-deliverable row and observe where the agent deviates from team dispatch
    - Simplify the implement skill's orchestration instructions — fewer words, clearer decision tree
    - Add a concrete orchestration example (copy-pasteable Agent tool call with specialist injection)
    - Consider a "dispatch checklist" the agent follows: read plan.json → for each wave → for each deliverable → spawn agent with specialist + context
    - Evaluate whether a shell-level orchestrator (like run-gate.sh for gates) would be more reliable than agent-level orchestration
    - Test with a 2-wave, 3-deliverable row as a validation case
  references:
    - "skills/implement.md"
    - "skills/decompose.md"
    - "skills/shared/context-isolation.md"
