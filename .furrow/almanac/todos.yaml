- id: pi-almanac-operating-model
  title: Build Pi's seed-backed almanac and planning surfaces
  context: |
    Pi should not stop at a strong `/work` loop. It also needs explicit planning
    and knowledge surfaces that help the operator understand project direction,
    inspect work state, create new work, triage the roadmap, and start rows from
    the right context. The target model is now explicit in
    `docs/architecture/pi-almanac-operating-model.md`: `/work` stays primary,
    planning surfaces are secondary, seeds replace TODOs as the canonical work
    graph, roadmap becomes an almanac projection over seeds, and almanac itself
    narrows toward memory + synthesis rather than duplicate task storage.

    This slice should therefore build Pi planning/almanac behavior against the
    seed-backed target rather than deepening `todos.yaml`-specific UX. Current
    TODO-backed almanac functionality may remain as temporary compatibility only
    where needed to bridge the migration.
  work_needed: |
