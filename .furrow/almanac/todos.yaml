- id: spike-row-mode
  title: "Spike row mode — implementation-flavored research with throwaway prototypes"
  context: |
    Sometimes work requires a quick prototype to catch unexpected considerations or
    clarify design/intent/constraints. These are messy and exploratory but highly
    informative of what the real design should look like. A spike is an implementation
    version of a research-row.

    Key properties: fixed time-box, output is a decision not a deliverable, throwaway
    code is expected, reduces uncertainty. Same 7-step enforcement (the strength of
    Furrow), but scope narrows:
    - Ideate: "what question does this spike answer?"
    - Research + Plan: "fastest path to a working prototype"
    - Spec: acceptance criteria = "we know enough when we can demonstrate X"
    - Implement: throwaway code + findings document
    - Review: did we answer the question? (not code quality)

    Fallow (passive code slop detection) is related but separate — stays exploratory.
    Row preparation (lighter pre-row investigation) is concerning because it weakens
    enforcement. Spikes preserve enforcement while narrowing scope.
  work_needed: |
