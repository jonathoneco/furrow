- context: |
    Furrow specialists are currently packaged as slash-command templates
    (.claude/commands/specialist:*.md + specialists/*.md). Dispatch instructions
    in skills/shared/specialist-delegation.md, skills/shared/context-isolation.md,
    and skills/implement.md tell the orchestrator to inline the template body
    into Agent(prompt=...) with model resolved from frontmatter.

    Failure mode observed 2026-04-22: orchestrator dispatched
    Task(subagent_type="specialist:test-engineer") during wave-1 pre-review.
    Claude Code's agent resolver has no such registered type — specialists are
    slash commands, not agents — so dispatch errored with the full available-agents
    list. The soft prompt-level norm ("inline the template body") silently allows
    this class of mis-invocation.

    Registering specialists as actual Claude Code agent types (.claude/agents/*.md)
    converts soft norms into harness-enforced invariants:
      1. Dispatch-time validation — typos in specialist names fail immediately
         instead of silently fabricating or drifting.
      2. Tool scoping — agent frontmatter can restrict tool allowlist
         (e.g., relational-db-architect denied Write/Bash, only Read/Grep),
         giving the harness real teeth instead of prompt-begging.
      3. Durable persona + model pin — specialist system prompt persists for
         the whole subagent session (not a user-message the model can drift
         from), and model selection cannot be fumbled by the orchestrator.

    This aligns with the "hard block over auto-correct" stance (see
    memory/feedback_hard_block_over_autocorrect.md).

    The cost to avoid: triple-sourced specialist definitions
    (specialists/*.md + .claude/commands/specialist:*.md + .claude/agents/*.md)
    drifting out of sync. Mitigation: treat specialists/*.md as the single source
    of truth; generate the other two at install/update time from it.
