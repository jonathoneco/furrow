- id: parallel-orchestration-and-launch-surfaces
  title: Preserve Furrow's parallel orchestration and launch surfaces
  context: |
    Furrow's value is not limited to single-threaded row progression. It also
    includes the ability to coordinate parallel work within a row and across
    roadmap rows/phases using explicit work decomposition, ownership, launch
    flows, and reintegration patterns. The migration currently underrepresents
    this power, especially around wave planning, tmux/worktree launch surfaces,
    and making roadmap structure operational rather than merely descriptive.

    This remains a fast-follow requirement after the staged `/work` operating
    loop is restored. It should stay architecturally connected to seeds,
    decompose/implement flow, and Pi's eventual coordination surfaces rather
    than becoming a disconnected later bucket.
  work_needed: |
    - Define the minimum preserved orchestration capabilities for within-row and cross-row parallel work
    - Connect Pi and backend planning surfaces to real launch/coordination flows rather than manual multitasking
    - Preserve or replace the useful parts of tmux/worktree launch integration in a Pi-first world
    - Keep seeds and decomposition work connected to these coordination needs rather than treating them as unrelated future work
    - Treat `docs/architecture/pi-step-ceremony-and-artifact-enforcement.md` as the prerequisite slice, not a competing track
