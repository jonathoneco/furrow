- id: furrow-self-update-hook
  title: "furrow-self-update-hook — session-start check for upstream Furrow changes"
  context: |
    Furrow is installed from a cloned repo, but nothing reminds the user when
    upstream has advanced. Since Furrow is the user's own toolchain, main
    advances whenever any row lands — a stale install can miss new skills,
    hooks, or CLI commands.

    Side note: user is considering removing the `install.sh --vendor` path
    entirely (2026-04-22). This TODO assumes all installs are live-tracked
    against upstream; if vendoring survives, a furrow.yaml opt-out would be
    revisited, but that's not the intended direction.
  work_needed: |
    - Hook script that runs on session start (or post-compact) and checks
      whether the installed Furrow is behind upstream main.
    - Detection mechanism: compare installed VERSION vs GitHub main's VERSION
      (decision baked). Assumes VERSION is bumped regularly. Commit-SHA
      fallback if VERSION isn't current.
    - Cache result — 24h TTL default, configurable via furrow.yaml.
    - Respect offline mode (no network access → skip silently).
    - Notification: session-start stdout message + surfaced in `/furrow:doctor`
      output. No desktop notifications.
    - Prompt-only (never auto-update). Aligns with "hard block over
      auto-correct" feedback memory.
    - Decide hook location: new `self-update-check.sh` vs extending
      `auto-install.sh`. `auto-install` handles fresh-install drift (different
      problem); lean toward new hook.
    - Store last-check timestamp in `.furrow/_meta.yaml` (or analogous
      durable location in the install dir).
