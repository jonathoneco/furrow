- id: low-finding-disposition-policy
  title: "LOW finding disposition policy — auto-TODO with audit trail"
  context: |
    Brain-dump 2026-04-22: "should we address LOW findings?" Review produces
    findings at LOW/MEDIUM/HIGH. MEDIUM and HIGH have clear handling (block
    or escalate). LOW has no policy — currently silent technical debt in
    `reviews/*.yaml` with no downstream action. Over many rows this
    aggregates into hidden scope.

    Related: log-disposition-discipline (same shape for machine-generated
    signals). patch-row-concept (patches are one outflow channel for LOW
    findings that get promoted from TODO).
  work_needed: |
    - Auto-convert each LOW finding to a TODO with `source_type: low-finding`
      at review completion (decision baked). Captures the debt without
      blocking the row.
    - TODO body includes finding text, file refs, reviewer rationale, and a
      back-reference to the source row + review result.
    - Dispositions are auditable (decision baked). If the user chose 'defer'
      (or the TODO sits untriaged for long enough), there must be a forcing
      function to revisit — e.g., `/furrow:triage` surfaces old low-finding
      TODOs as a dedicated category, or `frw doctor` warns when they exceed
      a threshold.
    - LOW findings do NOT auto-compound into MEDIUM/HIGH (decision baked —
      too magical). But: accumulated LOW findings against a single file
      should be a reviewer signal and surface in summaries. Track as a
      "many lows = red flag" heuristic in the review skill.
    - LOW → patch-row flow: always go through TODO first (decision baked).
      Patch-row promotion is a manual step; the TODO keeps the debt
      discoverable until someone commits to fixing it.
    - Enforcement point: the review step writes both the finding record
      AND the generated TODO at gate time. Not optional.
