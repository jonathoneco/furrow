    - Keep `/work` primary, but add explicit secondary planning surfaces for roadmap browse, work-item/seed browse, create, triage, and next-work recommendation
    - Make planning surfaces seed-backed rather than long-term TODO-backed
    - Support row init from selected roadmap/seed context through canonical backend flows
    - Surface almanac validation, rationale, learnings, and observations where they shape planning decisions
    - Preserve roadmap discipline as a strong default with explicit override rather than advisory-only or hard lock-in
    - Keep backend semantics canonical; do not move planning rules into TS
