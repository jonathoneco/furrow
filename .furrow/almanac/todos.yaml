# --- Standalone: Effort Selection Alongside Model Selection ---
- id: effort-selection-alongside-model
  title: "Add effort_hint to specialists and step skills — decouple reasoning depth from model identity"
  context: |
    Specialists currently declare `model_hint` (opus/sonnet/haiku) in frontmatter,
    and step skills declare `model_default`. This maps cleanly to "which model?"
    but conflates model choice with reasoning effort. Modern models expose explicit
    effort/thinking parameters — Claude extended thinking budgets, OpenAI's
    reasoning_effort (low/medium/high) — that can change cost and quality
    independently of model choice. A sonnet with high effort may outperform opus
    with low effort on some tasks, at much lower cost.

    Today Furrow can only control quality via model swap. Tasks that need deep
    reasoning force an opus upgrade; tasks that need only quick execution can't
    dial effort down on opus when opus is the default. This is crude.
  work_needed: |
    - Design an `effort_hint` field (low/medium/high or explicit budget) for specialist frontmatter
    - Extend step skill `model_default` to allow paired `effort_default`
    - Decide matrix semantics: model × effort — are all combinations valid? any forbidden pairs?
    - Plumb effort parameter through agent dispatch (Agent tool thinking budget, claude -p flags, codex -c)
    - Consider cost accounting: effort affects cost more than model choice for reasoning-heavy tasks
    - Update references/specialist-template.md with effort_hint guidance
    - Consider: should step-level modifier shift effort (research = high effort, implement = medium)?
    - Research current API surface for effort control across providers (Claude thinking, Codex reasoning_effort, etc.)
