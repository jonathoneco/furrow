- id: interactive-ideation-checkpoints
  title: "Collaborative check-ins at pre-implementation steps"
  context: |
    Ideation currently runs as a one-shot ceremony. But ideation, research, plan, and spec
    should all have exhaustive interactive collaboration sections where the agent works
    back and forth with the user — not just pausing once, but continuing to iterate until
    clarity is achieved. The instruction should be explicit: "continue to work back and
    forth with me to create clarity / address any open questions / hash out implementation
    details / challenge assumptions — don't make any assumptions, keep asking until we've
    fully resolved each area." This makes early steps genuinely collaborative rather than
    the agent producing artifacts the user reviews after the fact.
  work_needed: |
