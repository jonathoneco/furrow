- id: pi-native-capability-leverage
  title: Use Pi-native extensibility to strengthen Furrow after semantic parity is stable
  context: |
    Pi provides deep extensibility beyond a thin adapter surface: extensions,
    event hooks, custom UI, system-prompt shaping, skills, prompt templates,
    presets, packages, and dynamic resource loading. These are not the current
    priority over staged parity restoration, but they are one of the main reasons
    to prefer Pi as Furrow's primary host once backend-canonical workflow and
    preserved workflow power are stable.

    This TODO exists so Furrow does not stop at "minimum parity." After the
    staged `/work` loop and shared-backend validation are trustworthy, Furrow
    should intentionally exploit Pi-native capabilities to improve orchestration,
    UX, distribution, and operator leverage without moving canonical semantics
    out of the backend.
