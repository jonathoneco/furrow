- id: patch-row-concept
  title: "patch-row variant — lightweight harness mode for small fixes, bug fixes, accessibility issues"
  context: |
    Brain-dump 2026-04-22: "need a 'patch' concept for small fixes that should
    still go through the harness." The current 7-step row ceremony is right
    for non-trivial work but overkill for a typo fix, a one-line bug, an
    accessibility regression, or a minor doc tweak. Those still benefit from
    state tracking, review, and commit discipline — but don't need
    ideation/research/plan/spec separately. Without a patch mode, small fixes
    either bypass the harness entirely (losing the audit trail) or get
    shoehorned into full rows (ceremony tax).

    Scope includes: typos, one-line bug fixes, accessibility regressions,
    doc nits, small refactors with obvious intent.
  work_needed: |
    - Define the patch-row shape. Probably: collapsed step sequence
      (scope → implement → review), mandatory review, strict commit scope
      (single file or small tightly-coupled group).
    - Patch is a variant of code mode (decision baked — not a third
      top-level mode). `rws init --mode code --variant patch` or similar
      shape; prefer variant to avoid doubling the top-level mode surface.
      Open to pushback during ideation if variant-of-code turns out to be
      awkward in the state machine.
    - Scope threshold for promoting patch → full row: LOC count as a soft
      warn + judgement (decision baked). Harness flags when a patch grows
      past threshold but user confirms promotion — no silent expansion.
    - summary.md shape for patch: TBD in the row itself. Probably
      significantly shorter template; may only need key-findings + diff
      summary. Decide during implement.
    - Specialist dispatch for patches: TBD in the row. Torn between
      "no default, explicit opt-in only" and "specialist inferred from file
      patterns." Decide during ideation with a concrete patch example in
      hand.
    - Scope-change CLIs (row-scope-change-clis-rws-change-mode-and-rws-rena)
      handle mid-row reshape; this TODO handles starting-state shape. Not
      redundant.
  open_questions:
