  context: |
    The CLIs (frw, rws, alm, sds) are currently shell scripts routing to other shell
    scripts. Shell is actively painful at current scope: ARG_MAX bugs in alm triage
    (hit 2026-04-23 at 90 TODOs), no type safety, no structured logging, brittle
    error handling, and increasingly complex sub-dispatch logic.

    Decision 2026-04-23: rewrite in **Go**. Single-binary distribution, strong
    stdlib for YAML/JSON, clean CLI ergonomics, fast startup, shell-native feel,
    simple install story. TypeScript was the alternative — rejected because the
    node dependency weakens the install story and type-sharing with agent code
    isn't a near-term need.

    Decision 2026-04-23: all-in — no bash quick-wins phase. Ergonomics decisions
    from `cli-ergonomics-pass` become design input; their implementation lands in
    the rewrite, not in transitional bash.

    The harness also lacks self-understanding — it doesn't know its own tool
    inventory, and past conversations contain patterns that should be extracted
    into CLI features. This row includes building that introspection as a
    first-class feature of the new Go CLIs.
  created_at: "2026-04-04T00:00:00Z"
