constraints:
  - >-
    Stateless triggers: no counter, progress, or activation state is
    persisted on observations. Activation is a pure function of archive
    history (`state.json.archived_at` across `.furrow/rows/*`). The one
    permitted exception is `manual_activation_at` for
    `triggered_by.type == manual`, because manual triggers have no other
    signal.
  - >-
    Split status model: persisted `lifecycle` (`open | resolved |
    dismissed`) represents user-driven state; computed `activation`
    (`active | pending`) represents trigger-driven state and is never
    stored. An observation is surfaceable iff
    `lifecycle == open AND activation == active`.
  - >-
    No coupling to /furrow:merge: integration point is `archived_at` on
    row state. This row must be mergeable before /furrow:merge exists.
  - >-
    MVP trigger types are `row_archived`, `rows_since`, `manual`. Schema
    MUST NOT accept `after_date`, `row_merged`, or other types. Adding
    types later is a schema evolution, not a silent accept. `row_merged`
    is deferred deliberately — in an archive-only world the distinction
    from `row_archived` is meaningless; a true merge-based trigger can
    be added post /furrow:merge if the distinction matters.
  - >-
    Schema-first: D1 must validate before D2 is started; D2 must ship
    before D3 and D4.
  - >-
    No CLI stubs. `alm observe <verb>` is fully implemented for every
    verb in the deliverable (`add`, `list`, `show`, `resolve`,
    `dismiss`, `activate`, `on-archive`).
  - >-
    `additionalProperties: false` on the observations schema, matching
    `todos.schema.yaml`.
  - >-
    `source_type: decision-review` must be removed from the TODO schema
    after the one live user is migrated — the workaround is eliminated,
    not left coexisting.
  - >-
    No auto-resolution. Observations are surfaced by `/archive` and
    `alm triage` but resolving or dismissing them is always an explicit
    user action.
  - >-
    D4 migration must land as a single commit in the order specified in
    D4's acceptance criteria (add to observations → remove from todos →
    remove enum value), with `alm validate` passing between each step.
