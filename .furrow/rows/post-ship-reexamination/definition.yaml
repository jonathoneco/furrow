      `additionalProperties: false`, enums for controlled vocabularies,
      kebab-case id pattern, ISO 8601 timestamps. Also where the
      `decision-review` source_type enum value is removed in D4.

  - path: "bin/alm"
    symbols:
      - "cmd_validate"
    note: >-
      CLI to extend. Read subcommand dispatch pattern (lines ~1476,
      ~1505) and the existing `cmd_validate` (line ~827) to understand
