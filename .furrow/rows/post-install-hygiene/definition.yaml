    note: "Entries 2146-2253 — full context and work_needed for the 8 review-findings."
  - path: .furrow/almanac/roadmap.yaml
    note: "Phase 1 rationale: 'Test-isolation fix leads — tests corrupted live-repo symlinks, a safety issue.'"
  - path: .furrow/rows/install-and-merge/definition.yaml
