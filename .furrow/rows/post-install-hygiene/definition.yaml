  - path: docs/architecture/config-resolution.md
    note: "Audit table documenting each config field and its runtime consumer."
  - path: docs/architecture/testing.md
    note: "Sandbox contract and env-var resolution order for integration tests."

constraints:
  - "Safety-first ordering: test-isolation-guard lands before every other deliverable that adds or modifies integration tests. Enforced by explicit depends_on entries on script-modes-fix, cross-model-per-deliverable-diff, reintegration-schema-consolidation, xdg-config-consumer-wiring, promote-learnings-schema-fix, specialist-symlink-unification, and ac-10-e2e-fixture — making test-isolation-guard the single wave-1 deliverable."
  - "Canonical resolver reuse: xdg-config-consumer-wiring MUST use the existing resolve_config_value() in common.sh, not introduce a second helper. If the existing function needs extension (e.g., a default-value variant), the extension happens in place rather than via a parallel helper."
  - "Back-compat: no change to definition.yaml, state.json, or reintegration.schema.json public shape beyond the additive test_results.evidence_path requirement; existing rows' reviews must continue to validate (migrate archived rows if needed)."
  - "No live-worktree mutation under any test failure mode — once test-isolation-guard lands, every subsequent deliverable's tests must use setup_sandbox."
  - "POSIX sh in all shell scripts; bash-only features require an explicit shebang."
  - "Schemas are authoritative: inline jq subsets are forbidden in validation paths — use the Python Draft2020-12Validator via the shared validate-json.sh helper."
  - "Single resolver rule for XDG config: every field read goes through bin/frw.d/lib/common.sh resolve_config_value; ad-hoc yaml parsing in scripts is a review-blocker."
  - "Specialist symlinks never committed in the source repo; install.sh is the sole producer for both source and consumer checkouts."
  - "Scope discipline: no architectural redesign. The research step produced three in-scope expansions that are explicitly blessed — (R1) script-modes-fix covers all 20 non-executable scripts rather than rescue.sh only; (R2) promote-learnings-schema-fix migrates 4 old-format rows to the new canonical schema; (R3) xdg-config-consumer-wiring creates the first preferred_specialists runtime consumer in skills/shared/specialist-delegation.md. Any FURTHER expansion past these ACs requires opening a follow-up TODO and stopping."

gate_policy: supervised

