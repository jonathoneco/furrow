constraints:
  - "Backend canonical Go: handoff schemas, driver definitions schema, context-bundle schema, layer-policy schema, pattern interfaces, hook entry points (furrow hook *) all live in Go and JSON Schema. Adapters consume via runFurrowJson or process exec — never duplicate validation/policy logic"
  - "End-state migration target: canonical Go (no shells) + canonical Pi adapter with Claude support. New hooks ship as `furrow hook <name>` Go subcommands, NOT shell scripts. Avoids migration tech debt to canonical-Go target. (Existing shell hooks — state-guard.sh etc. — are debt to port; new shells are debt creation.)"
  - "Furrow backend is RUNTIME-AGNOSTIC. Claude-specific concepts (TeamCreate, .claude/agents/, ~/.claude/teams/) and Pi-specific concepts (@tintinweb/pi-subagents API, session-tree branches) live in the adapter integration layer ONLY. The backend has no awareness of session_id, no per-row driver registry, no runtime-specific files"
  - "All blocker codes registered in schemas/blocker-taxonomy.yaml before any emission. Emitting an unregistered code panics in test mode (pattern from pre-write-validation-go-first). Code allotments: D1 adds 3 (handoff_schema_invalid, handoff_required_field_missing, handoff_unknown_field); D3 adds 5 (skill_layer_unset, layer_policy_invalid, layer_tool_violation, engine_furrow_leakage, driver_definition_invalid); D6 adds 1 (presentation_protocol_violation). 9 total"
  - "Three-layer model is VERTICAL (operator → driver → engine), not horizontal across specialist types. The original 'furrow-aware vs unaware' framing in the source TODOs is superseded — harness-aware specialists are still engines from the contract's perspective; their handoff content can include Furrow internals only via curated grounding paths the driver passes them, but the layer they OPERATE in is engine"
  - "Long-running phase drivers are runtime-managed — Claude via TeamCreate/team-config; Pi via @tintinweb/pi-subagents. Furrow has NO drivers.json, NO `furrow driver mark/clear/list/resolve` CLIs, NO .furrow/.layer-context.{agent_type} files. Adapters use their own runtime state. Cross-session continuity is the runtime's responsibility (operator skill instructs the LLM)"
  - "Engine teams are composed at DISPATCH-TIME by drivers, not at PLANNING-TIME by the operator. team-plan.md is dropped from the row artifact set. plan.json's `specialist:` field per deliverable is a HINT for the implementing driver, not a binding contract. skills/plan.md is updated to reflect this"
  - "Engines are TRULY Furrow-unaware: EngineHandoff has no row, no step, no schema_version, no .furrow/ paths. Drivers BEAR THE CURATION RESPONSIBILITY when constructing engine handoffs. Schema validation enforces this — EngineHandoff with .furrow/ in any path or Furrow vocab in constraints fails validation"
  - "Cross-adapter parity invariant: Pi adapter (adapters/pi/extension/index.ts) and Claude `furrow hook layer-guard` Go subcommand consume the SAME .furrow/layer-policy.yaml. Pi adapter exec's furrow hook layer-guard with stdin JSON shaped to match Claude's hook payload. UX divergence (Pi: ctx.ui.notify; Claude: stdout/stderr) is intrinsic; the policy table and verdict logic are shared"
  - "Boundary leakage test (tests/integration/test-boundary-leakage.sh) must pass with zero matches against the leakage corpus. NON-NEGOTIABLE — architecture's smoke alarm. If leakage detected, root-cause the boundary breach; do not relax the corpus"
  - "Joint file ownership ordering (single-deliverable waves where overlap exists): internal/cli/app.go: D1 (W2) → D4 (W3) → D2 (W4) → D3 (W5); commands/work.md.tmpl: D4 (W3) → D2 (W4) → D3 (W5) → D6 (W6); skills/{ideate,research,plan,spec,decompose,implement,review}.md: D2 (W4 reframes content) → D3 (W5 adds layer: front-matter); skills/plan.md, skills/spec.md, skills/review.md additionally touched by D6 (W6, presentation references); schemas/blocker-taxonomy.yaml: D1 (W2) → D3 (W5) → D6 (W6); skills/shared/specialist-delegation.md: D2 (W4) → D3 (W5); docs/architecture/orchestration-delegation-contract.md: D3 owns; .claude/settings.json: D3 (W5) → D6 (W6) additive"
  - "Wave plan (six sequential waves): W1 = D5 (context-construction-patterns); W2 = D1 (handoff-schema); W3 = D4 (context-routing-cli); W4 = D2 (driver-architecture); W5 = D3 (boundary-enforcement); W6 = D6 (artifact-presentation-protocol). Single-deliverable waves required by joint file ownership above; parallel waves not viable for this row"
  - "No state.json or summary.md mutations from D1, D4, D5 (pure read+emit). D2/D3/D6 modify documentation and skill files but never touch row state directly. All state mutations route through rws as required by .claude/rules/cli-mediation.md"
  - "No new external Go dependencies; reuse vendored YAML and JSON libraries. If go-jsonschema generation is chosen for D1, evaluate vendored vs hand-maintained struct↔schema during spec"
  - "Pi adapter dependencies pinned: @tintinweb/pi-subagents@0.6.x and @mariozechner/pi-coding-agent@0.70.x in adapters/pi/package.json. Wrapped behind a thin Furrow PiAdapter interface so the dep is swappable. Recursive-spawn (subagent → subagent) verified at spec time by reading src/agent-runner.ts"
  - "D5 ships before D4 starts: D5's contracts.go, contracts_test.go, structure_test.go, and architecture doc are the contract D4 implements against. D5's review sign-off is partially gated on D4 strategies passing the conformance harness — exercised in W3 review (forces good integration; surfaces D5 contract gaps early)"
  - "Pi capability-gap (acknowledged): @tintinweb/pi-subagents subagent model is subprocess-spawn; parent's hook bus blind to subagent tool calls. Pi-side layer-guard scoped to main-thread (operator) only this row; subagent layer enforcement on Pi documented as known limitation. Engine context safety preserved by EngineHandoff Furrow-stripping (D1) plus post-hoc boundary leakage test (D3)"
  - "Spec-step pre-implementation verifications: (a) read @tintinweb/pi-subagents src/agent-runner.ts to confirm recursive subagent spawn (driver→engine path) — if broken, engine dispatch falls back to subprocess subagent per pi-mono example; (b) audit Claude Code current docs (sub-agents, hooks, agent-teams) for any breaking changes since T2 research"
  - "Conventional commits per project convention (feat:, fix:, chore:, docs:, refactor:, test:, infra:); each deliverable lands in its own commit (or contiguous commit run) referencing the deliverable name in the body"
  - "Pre-existing skills/ideate.md marker convention <!-- {phase}:section:{name} --> is preserved exactly by D6 — the protocol formalizes what already exists, does not invent new syntax"
  - "Risk register: D5-contract-rework (mitigation: conformance harness in D5's contracts_test.go run against D4's implementations during W3 review); internal/cli/app.go register-order contention (mitigation: every wave follows pre-write-validation-go-first registration pattern strictly); schemas/blocker-taxonomy.yaml four-way additive merge structural drift (mitigation: appendix-only additions, no reordering existing entries; D3 includes regression test that taxonomy stays under additionalProperties:false after each subsequent wave's append); experimental flag CLAUDE_CODE_EXPERIMENTAL_AGENT_TEAMS=1 absent (mitigation: frw doctor check added in D2)"
  - "Spec-step kill-switches active: if recursive-spawn verification on @tintinweb/pi-subagents fails, the engine dispatch path falls back to subprocess subagents per pi-mono example (engine isolation preserved by EngineHandoff content discipline either way). If Claude Code primitives have changed since T2 research, spec captures the delta and adjusts. If neither adapter can be wired end-to-end in this row, redirect via /furrow:redirect rather than ship a half-architecture"

