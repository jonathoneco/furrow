  - name: artifact-presentation-protocol
    specialist: harness-engineer
    depends_on: [driver-architecture, handoff-schema, boundary-enforcement]
    acceptance_criteria:
      - "skills/shared/presentation-protocol.md is the canonical reference. Codifies a single canonical mode for presenting artifacts in conversation: section-with-markers using format <!-- {phase}:section:{name} --> (the convention already used in skills/ideate.md). No alternative modes — full-file dumps and summary-with-link explicitly disallowed for in-conversation artifact presentation"
      - "Per-artifact section-break rules table in the protocol doc: definition.yaml → objective | each deliverable (one section per deliverable, named by deliverable.name) | context_pointers | constraints | gate_policy; plan.json → step-list | dependencies | risks; spec.md → goals | non-goals | approach | acceptance | open-questions; summary.md → key-findings | open-questions | recommendations; research.md → method | findings | gaps; handoff artifact (D1) → one section per top-level schema field. Exhaustive for canonical row artifacts"
      - "Phase prefix in markers is the current step (ideate, research, plan, spec, decompose, implement, review) when an artifact is being drafted/revised; presentation when shown for review; review when summarizing during the review step"
      - "Operator-only constraint: artifact presentation in conversation is the operator layer's responsibility per D2. Phase drivers do NOT present artifacts to user directly; they return phase results to the operator who renders them following this protocol. skills/shared/layer-protocol.md (D2) cross-references this constraint"
      - "furrow hook presentation-check Go subcommand (internal/cli/hook/presentation_check.go) reads stdin JSON (Stop hook input shape — assistant turn content), scans for artifact-shaped content (markdown blocks containing recognized artifact paths .furrow/rows/*/{definition,plan,spec,summary,research}.md|json|yaml or fenced code blocks > 30 lines matching canonical artifact schemas) without surrounding section markers. On detection, emits advisory warning with blocker code presentation_protocol_violation (severity warn, confirmation_path silent). Does NOT block. NOT a shell script"
      - "Claude adapter wiring: .claude/settings.json registers furrow hook presentation-check as Stop hook (additive to D3's PreToolUse layer-guard registration)"
      - "Blocker code: schemas/blocker-taxonomy.yaml gains presentation_protocol_violation (additive after D3's codes; sequential additive ownership)"
      - "Existing skills retrofit: skills/ideate.md already uses the marker convention (source of truth). skills/{plan,spec,review}.md gain explicit references to skills/shared/presentation-protocol.md in their Supervised Transition Protocol sections so each step's presentation is consistent. No content rewrites — additive references only"
      - "commands/work.md.tmpl gains a 'Presentation' section pointing to skills/shared/presentation-protocol.md as canonical mode reference; operator's user-facing rendering follows this protocol exclusively. Joint touch with D2/D4 — sequential per wave plan"
      - "Integration test (tests/integration/test-presentation-protocol.sh): replays a fixture conversation transcript containing an artifact rendered without markers, asserts the Stop hook fires with expected blocker code; replays a transcript with proper markers, asserts no hook fire"
