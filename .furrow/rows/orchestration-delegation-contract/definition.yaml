objective: |
  Establish the orchestration/delegation contract as a vertical 3-layer architecture
  (operator → phase driver → engine) with a runtime-agnostic Furrow backend and
  thin Claude/Pi adapters. Backend defines canonical primitives: forked handoff
  schemas (DriverHandoff Furrow-aware, EngineHandoff Furrow-unaware), context
  routing CLI, layer-policy authority, hook Go subcommands, static driver
  definitions, design-pattern interfaces. Adapters bridge runtime events into
  these primitives — Claude via TeamCreate/Agent/SendMessage + .claude/agents/
  rendering; Pi via @tintinweb/pi-subagents extension. Engines are TRULY
  Furrow-unaware: no row, no step, no .furrow/ paths in the engine handoff;
  drivers curate engine context. New hooks ship as `furrow hook <name>` Go
  subcommands, NOT shell scripts, to avoid migration debt to the canonical-Go
  end-state. The row ships contract + driver wiring + minimal-but-functioning
  integration on both adapters proving the architecture end-to-end.

deliverables:
  - name: context-construction-patterns
    specialist: harness-engineer
    acceptance_criteria:
      - "internal/cli/context/contracts.go defines canonical Go interfaces D4 implements: Builder (Reset, AddSkill, AddReference, AddArtifact, AddDecision, AddLearning, Build → Bundle), Strategy (Step() string; Apply(b Builder, src ContextSource) error), ChainNode (Next() ChainNode; Apply(b Builder, src ContextSource) error). Godoc names the design pattern (Builder, Strategy, Chain of Responsibility) and architectural intent on every interface"
      - "internal/cli/context/contracts_test.go defines a generic conformance harness for each interface (e.g., Builder.Reset must zero state; Strategy.Apply must be idempotent on identical inputs; ChainNode.Next nullity terminates the chain). The harness is exported so D4's strategy implementations plug in during D4's review"
      - "internal/cli/context/structure_test.go asserts every step listed in evals/gates/*.yaml has a registered Strategy in the strategy registry; asserts strategies/ contains exactly one .go file per registered step; asserts contracts.go is the only file in internal/cli/context/ that defines pattern interfaces"
      - "docs/architecture/context-construction-patterns.md — sections: (1) Why patterns here, (2) Builder, (3) Strategy, (4) Chain of Responsibility, (5) When to add a new strategy, (6) Audit table mapping current ad-hoc loading sites in commands/work.md/skills/work-context.md/bin/frw.d/scripts/ to which pattern they migrate to"
      - "Audit table is concrete: every existing context-loading site enumerated with file:line, current mechanism, target pattern, migration owner (D4 or follow-up). Sites not migrated in this row become explicit follow-up TODOs"
      - "D5 ships before D4 starts (D4's depends_on enforces this). Contracts are a binding architectural reference, not a postmortem"
      - "Review-step verification: D4's strategy implementations cite their pattern in godoc and pass the conformance harness. D5's acceptance is partially gated on D4 strategies passing the harness — exercised in wave 3 review, not wave 1 review (forces good integration; surfaces interface gaps early)"
      - "go test ./... passes; go vet passes; structural test fails fast if a new step is added in evals/gates/ without a corresponding strategy file"
    file_ownership:
      - "internal/cli/context/contracts.go"
      - "internal/cli/context/contracts_test.go"
      - "internal/cli/context/structure_test.go"
      - "docs/architecture/context-construction-patterns.md"

  - name: handoff-schema
    specialist: go-specialist
    acceptance_criteria:
      - "Two forked schemas at schemas/handoff-driver.schema.json and schemas/handoff-engine.schema.json (both JSON Schema draft 2020-12, additionalProperties:false at all levels). NO shared base — divergence documented in code structure. NO schema_version field (handoffs are ephemeral artifacts; no re-validation after delegation). NO persona_ref field (target encodes persona by convention)"
      - "DriverHandoff (Furrow-aware, 7 fields): target (driver:{step}), step, row, objective (step-scoped), grounding (D4 bundle reference — path or inline structured per spec decision), constraints (row-level), return_format (phase EOS-report shape — schema reference, see field-shape AC below)"
      - "EngineHandoff (Furrow-unaware, 6 fields): target (engine:{specialist-id} | engine:freeform), objective (task-scoped, no row/step/Furrow framing), deliverables [{name, acceptance_criteria, file_ownership}], constraints (engine-scoped only — no .furrow/ paths, no blocker codes, no Furrow vocab), grounding [{path, why_relevant}] (curated source-file refs only — no .furrow/ paths), return_format (engine EOS-report shape — schema reference)"
      - "Field-shape decisions frozen at spec: (a) return_format — schema-reference style (string identifier resolving to a schema in templates/handoffs/return-formats/); (b) DriverHandoff.grounding — single path string referencing D4 bundle output; (c) EngineHandoff.grounding — array of {path, why_relevant} objects with relative paths only (no .furrow/* allowed by schema validation pattern)"
      - "Two Go structs in internal/cli/handoff/: DriverHandoff and EngineHandoff. NO shared base struct (no HandoffCommon embedding). Struct tags drive both JSON Schema generation and template rendering"
      - "Two render templates: templates/handoff-driver.md.tmpl and templates/handoff-engine.md.tmpl. Each is a Go text/template referencing every required schema field; rendered output is valid markdown with stable section order"
      - "internal/cli/handoff/render.go provides RenderDriver(h DriverHandoff) (string, error) and RenderEngine(h EngineHandoff) (string, error) that load the templates and render against the structs. Round-trip property: parse rendered output → struct equals input for the round-trippable subset"
      - "furrow handoff render --target driver:{step}|engine:{id} --row <name> --step <step> [--write] --json command exists. Dispatches on target prefix to DriverHandoff vs EngineHandoff renderer. --target driver:{step} builds DriverHandoff value (consumes D4 bundle reference, state.json, definition.yaml constraints); --target engine:{id} builds EngineHandoff value (driver-curated; the operator/driver provides the structured value via stdin or args). Emits markdown to stdout (default) or --json for the structured form"
      - "Handoff artifacts written to .furrow/rows/{name}/handoffs/{step}-to-{target}.md when --write passed. Idempotent (same inputs → same output bytes)"
      - "internal/cli/handoff/validate.go: furrow handoff validate <path> --json verifies a written handoff against the appropriate schema (sniffs target prefix to pick driver vs engine schema). Emits taxonomy-conformant blocker envelope on failure with codes registered in schemas/blocker-taxonomy.yaml: handoff_schema_invalid, handoff_required_field_missing, handoff_unknown_field"
      - "Engine handoff content discipline (test-enforced): EngineHandoff schema rejects (validation fails) any path containing '.furrow/' or any string matching the Furrow vocab corpus (row, step, gate_policy, deliverable, blocker, almanac). Schema-level enforcement of Furrow-unaware constraint"
      - "internal/cli/handoff/handoff_test.go covers: RenderDriver of valid value produces expected output; RenderEngine of valid value produces expected output; render with missing required fields fails with structured error; validate of valid file passes; validate of malformed file fails with registered code; round-trip parse-render-parse equality; engine handoff with .furrow/ path rejected at validation time"
      - "internal/cli/app.go registers 'handoff' top-level command group following the pre-write-validation-go-first 'validate' group registration pattern"
      - "go test ./... passes"
    file_ownership:
      - "schemas/handoff-driver.schema.json"
      - "schemas/handoff-engine.schema.json"
      - "templates/handoff-driver.md.tmpl"
      - "templates/handoff-engine.md.tmpl"
      - "templates/handoffs/return-formats/"
      - "internal/cli/handoff/schema.go"
      - "internal/cli/handoff/render.go"
      - "internal/cli/handoff/validate.go"
      - "internal/cli/handoff/handoff_test.go"
      - "internal/cli/app.go"
      - "schemas/blocker-taxonomy.yaml"

  - name: context-routing-cli
    specialist: go-specialist
    depends_on: [context-construction-patterns]
    acceptance_criteria:
      - "furrow context for-step <step> --target <operator|driver|engine|specialist:{id}> --row <name> --json command exists. --row defaults to focused row; --target defaults to driver. Emits a structured context bundle conforming to schemas/context-bundle.schema.json"
      - "Bundle shape: { row, step, target, skills: [{path, layer, content}], references: [{path, content?}], prior_artifacts: { state, summary_sections, gate_evidence, learnings }, decisions: [{source, from_step, to_step, outcome, rationale, ordinal}], step_strategy_metadata: {} }; schema validates additionalProperties:false at all levels. Decision shape derived from T3 finding (gate-transition regex output) — source distinguishes settled-decisions section vs key-findings fallback; ordinal preserves first-occurrence position for de-dup last-wins"
      - "Implements D5's contracts: Builder assembles the bundle; Strategy is selected by step (one Strategy per step at internal/cli/context/strategies/{step}.go); ChainNode applies override layering (defaults → step strategy → row overrides → target filter)"
      - "Per-step strategies for all 7 steps (ideate, research, plan, spec, decompose, implement, review); each registers via init() with the strategy registry; each cites its pattern in godoc"
      - "Skill filtering by target: --target=driver returns skills tagged layer:driver|shared; --target=engine|specialist:* returns skills tagged layer:engine|shared plus the named specialist's brief if --target=specialist:{id}; --target=operator returns layer:operator|shared. Skills without a layer field are rejected at load time with blocker code skill_layer_unset (registered by D3)"
      - "Decisions extraction (T3 finding): primary parser is strict regex against the de-facto gate-transition shape in summary.md ## Settled Decisions sections — pattern ^- \\*\\*([a-z_]+)->([a-z_]+)\\*\\*: (pass|fail) — (.*)$ — verified 49/49 conformance. Secondary fallback: best-effort scrape of ^- Decision: prose bullets in ## Key Findings. De-dup policy for gate retries: last-wins, preserving order"
      - "Learnings inclusion: reads .furrow/rows/{row}/learnings.jsonl; --target=engine filters to broadly_applicable:true entries (engines should not see harness-specific learnings); --target=driver|operator includes all"
      - "Replaces ad-hoc loading in commands/work.md.tmpl: the rendered operator skill no longer reads skills/{step}.md directly; shells out to furrow context for-step --target operator and consumes the bundle"
      - "Same primitive used by D2: when the operator spawns/messages a driver, the priming message includes the bundle returned by furrow context for-step --target driver:{step}; when the driver dispatches an engine, it uses --target specialist:{id} and curates the result before passing to handoff render"
      - "Performance: bundle generation under 500ms for a row with 7 steps of accumulated artifacts on the reference fixture"
      - "Caching: identical inputs produce identical bytes; --no-cache flag bypasses caching for testing; cache key derived from (row, step, target, content-hashes-of-inputs); cache invalidates on state.json mtime change"
      - "Unit tests cover each strategy in isolation (every step), Builder assembly, ChainNode override layering, target filtering for each layer, missing-skill-layer rejection, missing-row error, decisions extraction, learnings filtering"
      - "Integration test (tests/integration/test-context-routing.sh): exercises a fixture row across multiple steps, asserts bundle shape and content for each --target; round-trip via D1's furrow handoff render produces a renderable handoff"
      - "internal/cli/app.go registers 'context' top-level command group (joint touch with D1's 'handoff' registration; sequential per wave plan)"
      - "go test ./... passes"
    file_ownership:
      - "internal/cli/context/builder.go"
      - "internal/cli/context/chain.go"
      - "internal/cli/context/registry.go"
      - "internal/cli/context/strategies/ideate.go"
      - "internal/cli/context/strategies/research.go"
      - "internal/cli/context/strategies/plan.go"
      - "internal/cli/context/strategies/spec.go"
      - "internal/cli/context/strategies/decompose.go"
      - "internal/cli/context/strategies/implement.go"
      - "internal/cli/context/strategies/review.go"
      - "internal/cli/context/strategies_test.go"
      - "internal/cli/context/builder_test.go"
      - "internal/cli/context/chain_test.go"
      - "internal/cli/context/cmd.go"
      - "internal/cli/app.go"
      - "schemas/context-bundle.schema.json"
      - "tests/integration/test-context-routing.sh"
      - "commands/work.md.tmpl"

  - name: driver-architecture
    specialist: harness-engineer
    depends_on: [handoff-schema, context-routing-cli]
    acceptance_criteria:
      - "Driver definitions at .furrow/drivers/driver-{step}.yaml — 7 files (ideate, research, plan, spec, decompose, implement, review). Static, runtime-agnostic. Schema: { name: 'driver:{step}', step: '{step}', tools_allowlist: [...], model: 'opus|sonnet|haiku' }. Persona is implicit by convention (skills/{step}.md is the driver brief)"
      - "schemas/driver-definition.schema.json validates the YAML structure (additionalProperties:false). furrow validate driver-definitions --json command checks every .furrow/drivers/driver-{step}.yaml against the schema and emits blocker code driver_definition_invalid (registered by D3 alongside other validation codes — see joint ownership note)"
      - "skills/shared/layer-protocol.md is the canonical contract: defines operator (whole-row, user-facing, state-mutating), phase driver (one-step, session-scoped, runtime-managed), engine (one-shot, Furrow-unaware). Defines handoff exchange (driver→engine via D1's render command), engine-team-composed-at-dispatch model (drivers compose engine teams per dispatch, not at planning-time), and runtime-agnostic message-passing semantics. Cross-references skills/shared/specialist-delegation.md"
      - "skills/shared/specialist-delegation.md rewritten for driver→engine dispatch (replacing the operator→specialist framing). References skills/shared/layer-protocol.md for boundaries; references furrow handoff render --target=engine:* for the dispatch primitive; documents engine-team composition (a driver can dispatch multiple engines in parallel for one deliverable)"
      - "skills/work-context.md updated to describe the operator's per-row context (per-step context moves to driver context via furrow context for-step)"
      - "All 7 skills/{step}.md (ideate, research, plan, spec, decompose, implement, review) reframed as driver briefs — addressed to the phase driver, not the operator. Driver responsibilities: run step ceremony, dispatch engine team, assemble EOS-report. User-facing presentation logic moves out of skills/{step}.md and into commands/work.md.tmpl (operator owns user dialog)"
      - "skills/plan.md update: removes the team-plan.md prescription. Reframes planning step around layered model — engine teams composed at dispatch-time by drivers, not planning-time by operator. plan.json keeps wave/file_ownership/specialist-hint surface; team-plan.md is dropped from the row artifact set entirely (this row's existing team-plan.md will be deleted)"
      - "commands/work.md.tmpl is a Go text/template (not a static markdown file) with runtime branches: {{ if eq .Runtime \"claude\" }} ... TeamCreate/Agent/SendMessage block ... {{ else if eq .Runtime \"pi\" }} ... pi-subagents primitives + tree-branch nav block ... {{ end }}. Rendered at install time by furrow render adapters --runtime=<claude|pi>"
      - "furrow render adapters --runtime=<claude|pi> Go util (internal/cli/render/adapters.go) renders runtime-specific files from the runtime-agnostic definitions: (a) commands/work.md.tmpl → commands/work.md per runtime; (b) for Claude, .furrow/drivers/driver-{step}.yaml → .claude/agents/driver-{step}.md (subagent definition with tools/model frontmatter + skills/{step}.md as system prompt body); (c) any other runtime-specific renderings"
      - "Operator session-resume protocol is RUNTIME-CONCERN, not Furrow-concern: the operator skill (rendered for Claude or Pi) instructs the LLM on the appropriate session-resume detection. Claude block: read ~/.claude/teams/{row-name}/config.json; detect stale members; re-spawn via TeamCreate. Pi block: @tintinweb/pi-subagents handles its own session resume. Furrow backend has NO session_id awareness, NO drivers.json, NO per-row driver registry"
      - "Adapter integration in this row is minimal-but-functioning on BOTH adapters: at row close, an end-to-end smoke (operator spawns one driver, that driver dispatches one engine, full layer-guard active throughout, leakage test passes) succeeds on both runtimes. Deeper hardening (per-driver model routing, parallel engine teams, dashboard UX) is captured as follow-up rows"
      - "Pi adapter package adoption: adapters/pi/package.json declares dep on @tintinweb/pi-subagents (pinned at the latest stable, currently 0.6.x — exact version locked at spec time after a quick npm registry check) and @mariozechner/pi-coding-agent peer dep (pinned 0.70.x). Wrapped behind a thin Furrow PiAdapter interface (internal package boundary) so the dep is swappable. adapters/pi/extension/index.ts hooks tool_call → exec `furrow hook layer-guard` with stdin JSON; before_agent_start → setActiveTools(driver.tools_allowlist) + return {systemPrompt: skills/{step}.md content}; bridges Furrow row state ↔ pi-subagents lifecycle"
      - "Recursive-spawn verification: as a spec-time pre-implementation sanity check, read @tintinweb/pi-subagents src/agent-runner.ts to confirm subagents can themselves spawn subagents (driver→engine path). If broken, the engine-dispatch path needs fallback (subprocess subagent per pi-mono example). Spec captures the verification result; implementation may pivot if blocked"
      - "Integration test (tests/integration/test-driver-architecture.sh): exercises layered dispatch end-to-end on a fixture row — operator spawns a driver for one step, driver dispatches an engine, engine returns EOS-report, driver returns phase result, operator presents to user. Asserts each layer made only its allowed tool calls (operator: rws/alm; driver: read-only; engine: none). Runs against BOTH adapter modes (Claude via in-process Agent stub; Pi via @tintinweb/pi-subagents)"
      - "All step skills pass evals/skills/ structural checks (front-matter present, named sections per skills/shared/skill-template.md if extant, step-mechanics block present). D3 owns the layer: front-matter additions in a subsequent wave"
    file_ownership:
