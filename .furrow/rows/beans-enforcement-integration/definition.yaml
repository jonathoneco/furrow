constraints:
  - "state.json is Furrow-exclusive write — agents read, only rws/scripts mutate"
  - "Two-phase --request/--confirm transition flow must be preserved in rws transition"
  - "Clean swap — no intermediate state where old (.work/) and new (.furrow/) coexist in source code"
  - "sds, rws, and alm are POSIX shell + jq — no new runtime dependencies"
  - "Seeds is mandatory — no opt-in config, no graceful degradation except during initial project bootstrap"
  - "Seed status mismatch is a hard block — user must investigate, never auto-correct"
  - "Old integration tests deleted, replaced with CLI-framed test suite (sds, rws, alm)"
  - "CLIs are the abstraction layer — all harness enforcement/interaction goes through sds/rws/alm, never raw scripts"
  - "Domain hooks (gate-check, summary-regen, timestamp-update, transition-guard) fold into rws; policy hooks stay separate"
  - "Absorbed scripts are deleted after CLI absorption (no stubs)"
  - "furrow.yaml seeds section: just prefix for now (seeds.prefix)"
  - "Recovery from seed mismatch requires human input — no automated resync"
  - "Gate policy and nonce verification in supervised transitions must remain intact through rws refactor"
  - "Post-completion: extract TODOs for deferred almanac subcommands (learn, rationale, docs, specialists, history)"

gate_policy: supervised

source_todo: beans-enforcement-integration
