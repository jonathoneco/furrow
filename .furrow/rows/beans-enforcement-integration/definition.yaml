objective: >-
  Integrate Seeds as mandatory core infrastructure into Furrow, unify row
  lifecycle management under the rws CLI, create the alm CLI for planning
  and knowledge management, and restructure all harness state under .furrow/
  — executing as a clean swap with no intermediate state.

deliverables:
  - name: furrow-restructure
    acceptance_criteria:
      - "No remaining references to .work/ in harness source (verified by grep, excluding .furrow/rows/ data)"
      - "No remaining references to 'work unit' in harness source (verified by grep)"
      - "Migration script (scripts/migrate-to-furrow.sh) moves .work/ → .furrow/rows/, .beans/ → .furrow/seeds/, todos.yaml → .furrow/almanac/todos.yaml, ROADMAP.md → .furrow/almanac/roadmap.yaml, _rationale.yaml → .furrow/almanac/rationale.yaml"
      - "Migration script is idempotent (running twice is safe)"
      - "Migration handles edge cases: mid-transition rows, missing dirs, no .beans/"
      - "Migration renames state.json fields: issue_id → seed_id, epic_id → epic_seed_id in all existing row data"
      - "references/work-unit-layout.md renamed to references/row-layout.md with updated content"
      - ".claude/CLAUDE.md, .claude/furrow.yaml, install.sh updated for new paths"
    specialist: shell-specialist
    file_ownership:
      - "scripts/migrate-to-furrow.sh"
      - "references/row-layout.md"

  - name: sds-cli
    acceptance_criteria:
      - "bin/sds exists as POSIX shell + jq script forked from work-harness bn"
      - "sds init --prefix proj creates .furrow/seeds/config with prefix"
      - "sds create --title '...' --type task creates entry in .furrow/seeds/seeds.jsonl"
      - "sds update <id> --status implementing succeeds (extended harness-aware statuses)"
      - "Extended statuses accepted: open, claimed, ideating, researching, planning, speccing, decomposing, implementing, reviewing, closed"
      - "sds list, show, close, ready, dep add/rm, search all work correctly"
      - "sds --json flag outputs valid JSONL for scripting"
      - "Data stored in .furrow/seeds/seeds.jsonl with flock concurrency"
      - "install.sh symlink table includes sds"
    specialist: cli-designer
    file_ownership:
      - "bin/sds"

  - name: rws-cli
    acceptance_criteria:
      - "bin/rws exists as POSIX shell + jq script with subcommand dispatch"
      - "rws init <name> --title '...' creates .furrow/rows/<name>/state.json"
      - "rws transition --request and --confirm implement two-phase flow (preserving supervised gating)"
      - "rws status [name] shows row state"
      - "rws list --active shows non-archived rows"
      - "rws archive <name> marks row archived"
      - "rws gate-check <name> runs pre-step structural filter"
      - "rws load-step <name> outputs step skill content"
      - "rws rewind <name> steps back with fail gate record"
      - "rws diff <name> shows diff from base_commit"
      - "rws --help documents all subcommands"
      - "No harness code calls absorbed scripts directly (init-work-unit, step-transition, advance-step, detect-context, load-step, record-gate, validate-step-artifacts, regenerate-summary, gate-precheck, archive-work, rewind)"
      - "Absorbed scripts are deleted (not stubbed)"
      - "All Claude Code commands (work.md, status.md, archive.md, etc.) call rws subcommands"
      - "Domain hooks folded into rws: gate-check, summary-regen, timestamp-update, transition-guard"
      - "Policy hooks updated to call rws where needed: validate-summary, correction-limit, etc."
      - "rws regenerate-summary and rws validate-summary exposed as public subcommands"
      - "install.sh symlink table includes rws"
    specialist: cli-designer
    depends_on:
      - furrow-restructure
    file_ownership:
      - "bin/rws"

  - name: seeds-row-integration
    acceptance_criteria:
      - "rws init auto-creates seed via sds create, stores seed_id in state.json"
      - "rws init --seed-id <id> validates seed exists via sds show, links it"
      - "rws init --source-todo <id> looks up TODO seed_id; if absent, creates seed and backfills .furrow/almanac/todos.yaml"
      - "Every rws transition updates seed status to match new step via sds update"
      - "Gate evaluation includes seed-consistency dimension: seed exists, not closed, status matches"
      - "Seed status mismatch produces hard block with clear error message and recovery instructions"
      - "rws archive auto-closes seed via sds close --reason 'archived: {name}'"
      - "Recovery path documented: how to investigate mismatch, manual sds update to resync"
      - "state.json schema uses seed_id and epic_seed_id (no issue_id or epic_id)"
      - "hooks/gate-check.sh validates seed state"
      - "furrow.yaml has no beans opt-in section — seeds always on"
      - "evals/gates/ include seed-consistency checks"
    specialist: harness-engineer
    depends_on:
      - sds-cli
      - rws-cli
    file_ownership:
      - "evals/dimensions/seed-consistency.yaml"

  - name: alm-cli
    acceptance_criteria:
      - "bin/alm exists as POSIX shell + jq script with subcommand dispatch"
      - "alm add creates a TODO in .furrow/almanac/todos.yaml"
      - "alm extract [row] extracts TODO candidates from row artifacts"
      - "alm list shows TODOs with seed linkage where present"
      - "alm show <id> displays TODO detail and linked seed status"
      - "alm triage generates .furrow/almanac/roadmap.yaml from todos.yaml"
      - "alm next [--phase N] generates handoff prompts from roadmap.yaml"
      - "alm validate validates todos.yaml schema"
      - "alm --help documents all subcommands"
      - "todos.yaml schema accepts optional seed_id field"
      - "source_type enum includes 'legacy'"
      - "roadmap.yaml is structured YAML (phases, work units, dependency graph, conflict zones)"
      - "alm render generates optional human-readable Markdown from roadmap.yaml on demand"
      - "Claude Code commands (/work-todos, /furrow:triage, /furrow:next) call alm"
      - "install.sh symlink table includes alm"
      - "Post-completion TODOs extracted for deferred almanac subcommands (learn, rationale, docs, specialists, history)"
    specialist: cli-designer
    depends_on:
      - furrow-restructure
    file_ownership:
      - "bin/alm"
      - ".furrow/almanac/"

  - name: cli-test-suite
    acceptance_criteria:
      - "Old integration tests (test-step-transition.sh, test-correction-limit.sh, test-load-step.sh, test-check-artifacts.sh) deleted"
      - "New test suite framed around CLIs: test-sds.sh, test-rws.sh, test-alm.sh"
      - "sds tests cover: init, create, update with extended statuses, list, show, close, ready, dep, search"
      - "rws tests cover: init, transition (two-phase supervised flow), status, list, archive, rewind, diff, focus"
      - "alm tests cover: add, extract, validate, triage (roadmap.yaml output), next"
      - "Integration test: full lifecycle (rws init → sds seed created → step transitions with seed sync → archive with seed close)"
      - "tests/integration/helpers.sh updated for .furrow/ paths"
    specialist: test-engineer
    depends_on:
      - seeds-row-integration
    file_ownership:
      - "tests/integration/test-sds.sh"
      - "tests/integration/test-rws.sh"
      - "tests/integration/test-alm.sh"

  - name: architecture-docs
    acceptance_criteria:
      - "docs/architecture/cli-architecture.md documents three-CLI model (sds, rws, alm), data flows, .furrow/ directory structure"
      - "docs/architecture/cli-architecture.md documents hook disposition (domain hooks in CLIs vs policy hooks separate)"
      - "docs/architecture/cli-architecture.md documents the abstraction principle: harness interacts via CLIs, not internals"
      - "references/row-layout.md updated to reflect .furrow/ structure with seeds/ and almanac/"
      - "references/gate-protocol.md updated with seed-consistency dimension"
      - "Migration guide included: how to bring existing .work/ project to .furrow/"
    specialist: harness-engineer
    depends_on:
      - seeds-row-integration
    file_ownership:
      - "docs/architecture/cli-architecture.md"

