# .work/_meta.yaml — Work unit directory structure documentation.
# See _rationale.yaml for component rationale.

# Work unit files
components:
  definition.yaml: "Structured work contract: objective, deliverables, constraints"
  state.json: "Lifecycle state: step, progress, gate audit trail"
  summary.md: "Context recovery document, regenerated at step boundaries"
  reviews/: "Structured review results, one per deliverable"
  plan.json: "Wave assignments and specialist mappings for parallel execution"
  team-plan.md: "Agent team composition and coordination strategy"
  research.md: "Single-agent research output"
  research/: "Multi-agent research: per-topic files + synthesis.md"
  spec.md: "Single-deliverable specification"
  specs/: "Multi-component specifications, one per component"
  gates/: "Structured gate evidence with dimensional verdicts"
  learnings.jsonl: "Per-work-unit learning capture (JSONL, append-only during execution)"
  promotion-candidates.jsonl: "Component promotion candidates identified during review"
