- id: summary-agent-written-sections-not-populated-at-step-boundaries
  title: "Summary.md Agent-Written Sections Not Populated at Step Boundaries"
  context: |
    The `validate-summary.sh` hook repeatedly fires at session stop because the agent-written sections of `summary.md` (Key Findings, Open Questions, Recommendations) are never populated during step transitions. `regenerate-summary.sh` creates the skeleton and preserves existing content if it has 2+ lines, but inserts 1-line placeholders otherwise. No step skill instructs the agent to write these sections, and no gate or transition checks for their completeness. The result is that every session ends with a manual fix.
  work_needed: |
    - Add explicit instruction to step skills (or a shared skill fragment) requiring the agent to populate Key Findings, Open Questions, and Recommendations before step completion
    - Alternatively, make `validate-summary.sh` a pre-gate requirement (blocking) in `step-transition.sh` rather than a post-stop warning
    - Consider whether `regenerate-summary.sh` should refuse to overwrite populated sections even if they're short (1 line of real content vs placeholder)
  risks: |
    - Adding instructions to every step skill creates maintenance burden — a shared fragment or reference is safer
    - Making it a hard blocker could stall transitions when sections are genuinely not applicable (e.g., ideate step has no "Key Findings" yet)
    - Need to distinguish "placeholder" from "intentionally brief"
  references:
    - "scripts/regenerate-summary.sh"
    - "hooks/validate-summary.sh"
    - "skills/*.md"
    - "commands/lib/step-transition.sh"
  source_work_unit: "todos-workflow"
  source_type: "manual"
